services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: arcane_ledger
      POSTGRES_USER: arcane
      POSTGRES_PASSWORD: arcane_dev_pass
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://arcane:arcane_dev_pass@postgres:5432/arcane_ledger
      JWT_SECRET: dev-secret-change-in-production
      PORT: "4000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      VITE_GRAPHQL_URL: http://localhost:4000/graphql
      VITE_GRAPHQL_WS_URL: ws://localhost:4000/graphql
      VITE_USE_MOCK: "false"

volumes:
  pgdata:
